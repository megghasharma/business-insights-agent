<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Insights Agent — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f14; --bg-card: #16161e; --bg-chat: #1c1c26; --border: #2a2a3a;
    --text: #eaeaf0; --text-sec: #9595ad; --text-dim: #5e5e78;
    --purple: #a855f7; --purple-dim: rgba(168,85,247,0.12);
    --teal: #14b8a6; --teal-dim: rgba(20,184,166,0.12);
    --pink: #ec4899; --blue: #6366f1; --blue-dim: rgba(99,102,241,0.12);
    --orange: #f97316; --orange-dim: rgba(249,115,22,0.12);
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .dots-bg { position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.06; background-image:radial-gradient(rgba(168,85,247,0.5) 1px, transparent 1px); background-size:32px 32px; }
  .app { position:relative; z-index:1; max-width:1400px; margin:0 auto; padding:32px 24px; }
  .hdr { margin-bottom:32px; display:flex; align-items:flex-start; gap:16px; }
  .hdr-icon { width:52px; height:52px; border-radius:14px; background:linear-gradient(135deg,#a855f7,#14b8a6); display:flex; align-items:center; justify-content:center; font-size:26px; box-shadow:0 0 40px rgba(168,85,247,0.2); flex-shrink:0; }
  .hdr h1 { font-size:26px; font-weight:700; letter-spacing:-0.5px; }
  .hdr p { color:var(--text-sec); font-size:14px; margin-top:4px; }
  .tag { display:inline-flex; gap:5px; align-items:center; background:var(--purple-dim); color:var(--purple); padding:3px 10px; border-radius:16px; font-size:11px; font-weight:600; border:1px solid rgba(168,85,247,0.2); margin-left:10px; }
  .tabs { display:flex; gap:3px; background:var(--bg-card); border-radius:10px; padding:3px; border:1px solid var(--border); margin-bottom:28px; width:fit-content; }
  .tab-btn { padding:9px 18px; border-radius:8px; border:none; background:transparent; color:var(--text-dim); font-family:inherit; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s; }
  .tab-btn:hover { color:var(--text-sec); }
  .tab-btn.on { background:var(--purple-dim); color:var(--purple); }
  .card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:22px; }
  .card h3 { font-size:14px; font-weight:600; margin-bottom:3px; }
  .card .sub { font-size:11px; color:var(--text-dim); margin-bottom:16px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:28px; }
  .chat-container { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; max-width:900px; margin:0 auto; }
  .chat-header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .chat-header .status { width:8px; height:8px; border-radius:50%; background:var(--teal); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .chat-header span { font-size:13px; font-weight:600; }
  .chat-body { padding:20px; max-height:600px; overflow-y:auto; display:flex; flex-direction:column; gap:16px; }
  .msg { display:flex; gap:10px; max-width:85%; }
  .msg.user { align-self:flex-end; flex-direction:row-reverse; }
  .msg-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
  .msg.agent .msg-avatar { background:var(--purple-dim); }
  .msg.user .msg-avatar { background:var(--teal-dim); }
  .msg-bubble { padding:12px 16px; border-radius:12px; font-size:13px; line-height:1.6; }
  .msg.agent .msg-bubble { background:var(--bg-chat); border:1px solid var(--border); color:var(--text-sec); }
  .msg.user .msg-bubble { background:var(--purple-dim); border:1px solid rgba(168,85,247,0.2); color:var(--text); }
  .tool-call { background:rgba(20,184,166,0.06); border:1px solid rgba(20,184,166,0.15); border-radius:8px; padding:10px 14px; font-family:'JetBrains Mono'; font-size:11px; margin:8px 0; color:var(--teal); }
  .tool-call .tool-name { font-weight:600; margin-bottom:4px; }
  .tool-call .tool-result { color:var(--text-dim); margin-top:6px; }
  .chat-input { display:flex; gap:8px; padding:14px 20px; border-top:1px solid var(--border); }
  .chat-input input { flex:1; padding:10px 14px; background:var(--bg-chat); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'Outfit'; font-size:13px; outline:none; }
  .chat-input input:focus { border-color:var(--purple); }
  .chat-input button { padding:10px 20px; background:linear-gradient(135deg,#a855f7,#6366f1); border:none; border-radius:8px; color:#fff; font-weight:600; font-family:inherit; font-size:13px; cursor:pointer; }
  .sample-qs { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
  .sample-q { padding:8px 14px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--text-sec); font-family:'Outfit'; font-size:12px; cursor:pointer; transition:all 0.2s; }
  .sample-q:hover { border-color:var(--purple); color:var(--purple); background:var(--purple-dim); }
  .arch-diagram { display:flex; align-items:center; justify-content:center; gap:16px; flex-wrap:wrap; padding:30px 20px; }
  .arch-box { padding:16px 20px; border-radius:10px; text-align:center; min-width:160px; border:1px solid var(--border); }
  .arch-box .arch-icon { font-size:28px; margin-bottom:6px; }
  .arch-box .arch-title { font-size:13px; font-weight:600; }
  .arch-box .arch-sub { font-size:10px; color:var(--text-dim); margin-top:3px; }
  .arch-arrow { font-size:20px; color:var(--purple); }
  .tools-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; }
  .tool-card { padding:16px; border-radius:10px; border:1px solid var(--border); background:rgba(255,255,255,0.01); }
  .tool-card .tc-name { font-size:13px; font-weight:600; color:var(--purple); font-family:'JetBrains Mono'; margin-bottom:6px; }
  .tool-card .tc-desc { font-size:12px; color:var(--text-dim); line-height:1.5; }
  .kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px; margin-bottom:24px; }
  .kpi { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; }
  .kpi .kpi-label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:5px; }
  .kpi .kpi-val { font-size:26px; font-weight:700; font-family:'JetBrains Mono'; }
  .chart-box { position:relative; width:100%; height:260px; }
  .footer { text-align:center; margin-top:40px; padding:20px; border-top:1px solid var(--border); color:var(--text-dim); font-size:12px; }
  .footer a { color:var(--purple); text-decoration:none; }
  @media (max-width:768px) { .grid2 { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="dots-bg"></div>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback} = React;

const SAMPLE_QUESTIONS = ['Which region has the highest profit margin?','Compare online vs in-store performance','Detect anomalies in discount patterns'];
const TOOLS_LIST = [
  {name:'inspect_data',desc:'Dataset overview: shape, types, statistics, sample rows'},
  {name:'query_data',desc:'Execute arbitrary Pandas queries on the loaded dataset'},
  {name:'calculate_metric',desc:'Compute metrics: mean, sum, correlation, growth rate, percentile'},
  {name:'detect_anomalies',desc:'Find statistical outliers using IQR or Z-score methods'},
  {name:'generate_summary',desc:'Produce structured executive summary with key findings'},
];
const DEMOS = {
  'Which region has the highest profit margin?': [
    {role:'user',text:'Which region has the highest profit margin and why?'},
    {role:'agent',text:'Analysing regional profit margins...',tools:[
      {name:'inspect_data',params:'{}',result:'Dataset: 1,200 rows \u00d7 14 columns'},
      {name:'query_data',params:'{"query":"df.groupby(Region)..."}',result:'North: \u00a32.4M rev, \u00a3680K profit | East: \u00a31.8M rev, \u00a3590K'},
      {name:'calculate_metric',params:'{"metric":"profit_margin"}',result:'North: 28.3% | East: 32.8% | South: 24.8% | West: 25.3%'},
    ]},
    {role:'agent',text:'The East region has the highest profit margin at 32.8%.\n\n\u2022 Lower cost-to-revenue ratio (66.7% vs North 70.8%)\n\u2022 Higher proportion of premium product sales\n\u2022 Fewer discounting campaigns (12% vs 23% nationally)'},
  ],
  'Compare online vs in-store performance': [
    {role:'user',text:'Compare online vs in-store channel performance'},
    {role:'agent',text:'Running channel comparison...',tools:[
      {name:'query_data',params:'{"query":"df.groupby(Channel).agg(...)"}',result:'Online: \u00a33.8M rev, 7.2 sat | In-Store: \u00a34.0M rev, 8.1 sat'},
      {name:'calculate_metric',params:'{"metric":"growth_rate"}',result:'Online: +18.4% YoY | In-Store: +3.2% YoY'},
    ]},
    {role:'agent',text:'Online is more profitable per pound, In-Store leads on satisfaction.\n\n\u2022 Online: \u00a33.8M revenue, 28.9% margin, +18.4% YoY\n\u2022 In-Store: \u00a34.0M revenue, 25.0% margin, +3.2% growth\n\nOnline growing 5.7x faster.'},
  ],
  'Detect anomalies in discount patterns': [
    {role:'user',text:'Detect anomalies in discount patterns'},
    {role:'agent',text:'Running anomaly detection...',tools:[
      {name:'detect_anomalies',params:'{"column":"Discount","method":"iqr"}',result:'23 anomalies (1.9%). Discounts > 42%. 14 of 23 in West region.'},
    ]},
    {role:'agent',text:'23 anomalous discount transactions detected (1.9%).\n\n\u26a0\ufe0f Red flags:\n\u2022 3 transactions at 65% discount in March\n\u2022 14 of 23 in West region\n\u2022 Generated -8.3% avg profit margin\n\nRecommendation: audit West region, implement 40% hard cap.'},
  ],
};

function ChartBox({type,data,options,h}){
  const ref=useRef(null);
  const chartRef=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}
    const cfg={type,data:JSON.parse(JSON.stringify(data)),options:JSON.parse(JSON.stringify(options||{}))};
    chartRef.current=new Chart(ref.current.getContext('2d'),cfg);
    return()=>{if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}};
  },[]);
  return <div className="chart-box" style={{height:(h||260)+'px'}}><canvas ref={ref} style={{position:'absolute',top:0,left:0,width:'100%',height:'100%'}}/></div>;
}

const TAB_NAMES=['Agent Demo','Architecture','Dataset Overview'];
function App(){
  const[tab,setTab]=useState(0);
  return(
    <div className="app">
      <div className="hdr"><div className="hdr-icon">\ud83e\udd16</div><div><h1>Business Insights Agent <span className="tag">MCP-Aligned</span></h1><p>AI-powered data analysis agent using Claude tool-use \u2014 ask business questions in plain English</p></div></div>
      <div className="tabs">{TAB_NAMES.map((t,i)=><button key={t} className={'tab-btn '+(tab===i?'on':'')} onClick={()=>setTab(i)}>{t}</button>)}</div>
      {tab===0&&<AgentDemo/>}{tab===1&&<ArchTab/>}{tab===2&&<DatasetTab/>}
      <div className="footer">Built by <a href="https://github.com/megghasharma" target="_blank">Megha Sharma</a> \u2014 MSc Business Analytics, Swansea University \u00b7 Python, Claude API (Tool Use)</div>
    </div>
  );
}

function AgentDemo(){
  const[messages,setMessages]=useState([]);const[input,setInput]=useState('');const[typing,setTyping]=useState(false);const chatRef=useRef(null);
  function ask(q){const question=q||input;if(!question.trim())return;setInput('');const conv=DEMOS[question];
    if(conv){setMessages(p=>[...p,{role:'user',text:question}]);setTyping(true);let d=800;conv.slice(1).forEach((m,i)=>{setTimeout(()=>{setMessages(p=>[...p,m]);if(i===conv.length-2)setTyping(false);},d);d+=m.tools?2000:1200;});}
    else{setMessages(p=>[...p,{role:'user',text:question},{role:'agent',text:'In the live version, Claude would call tools to analyse your dataset. Try a sample question above for a full demo.'}]);}
  }
  useEffect(()=>{if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight;},[messages,typing]);
  return(<div><div style={{textAlign:'center',marginBottom:16}}><div style={{fontSize:12,color:'var(--text-dim)',marginBottom:10}}>Try a sample question:</div><div className="sample-qs" style={{justifyContent:'center'}}>{SAMPLE_QUESTIONS.map((q,i)=><button key={i} className="sample-q" onClick={()=>ask(q)}>\ud83d\udcac {q}</button>)}</div></div>
    <div className="chat-container"><div className="chat-header"><div className="status"/><span>Business Insights Agent</span><span style={{marginLeft:'auto',fontSize:11,color:'var(--text-dim)',fontFamily:'JetBrains Mono'}}>claude-sonnet \u00b7 tool-use</span></div>
    <div className="chat-body" ref={chatRef}>
      {messages.length===0&&<div style={{textAlign:'center',padding:'40px 20px',color:'var(--text-dim)'}}><div style={{fontSize:40,marginBottom:12}}>\ud83e\udd16</div><div style={{fontSize:14,marginBottom:4}}>Drop in any CSV. Ask a business question.</div><div style={{fontSize:12}}>The agent autonomously inspects, queries, and summarises.</div></div>}
      {messages.map((m,i)=><div key={i} className={'msg '+(m.role==='user'?'user':'agent')}><div className="msg-avatar">{m.role==='user'?'\ud83d\udc64':'\ud83e\udd16'}</div><div className="msg-bubble">{m.tools&&m.tools.map((t,ti)=><div className="tool-call" key={ti}><div className="tool-name">\u26a1 {t.name}({t.params})</div><div className="tool-result">\u2192 {t.result}</div></div>)}{m.text.split('\n').map((line,li)=><div key={li} style={{marginBottom:line===''?8:2}}>{line.startsWith('\u2022')?<span style={{paddingLeft:8}}>{line}</span>:line.startsWith('\u26a0')?<span style={{color:'var(--orange)'}}>{line}</span>:line}</div>)}</div></div>)}
      {typing&&<div className="msg agent"><div className="msg-avatar">\ud83e\udd16</div><div className="msg-bubble" style={{display:'flex',gap:6}}><span style={{animation:'pulse 1s infinite'}}>\u25cf</span><span style={{animation:'pulse 1s infinite 0.2s'}}>\u25cf</span><span style={{animation:'pulse 1s infinite 0.4s'}}>\u25cf</span></div></div>}
    </div>
    <div className="chat-input"><input placeholder="Ask a business question..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')ask();}}/><button onClick={()=>ask()}>Ask \u2192</button></div></div></div>);
}

function ArchTab(){
  const boxes=[{icon:'\ud83d\udcac',title:'User Query',sub:'Plain English',bg:'var(--teal-dim)',bc:'rgba(20,184,166,0.3)'},{icon:'\ud83e\udde0',title:'Claude API',sub:'Tool Use / Function Calling',bg:'var(--purple-dim)',bc:'rgba(168,85,247,0.3)'},{icon:'\u2699\ufe0f',title:'Tool Execution',sub:'Python / Pandas',bg:'var(--orange-dim)',bc:'rgba(249,115,22,0.3)'},{icon:'\ud83d\udcca',title:'Results',sub:'Fed back into context',bg:'var(--blue-dim)',bc:'rgba(99,102,241,0.3)'}];
  return(<div><div className="card" style={{marginBottom:24}}><h3>Agent Architecture</h3><div className="sub">MCP-aligned agentic loop with Claude tool orchestration</div><div className="arch-diagram">{boxes.map((b,i)=><React.Fragment key={i}><div className="arch-box" style={{background:b.bg,borderColor:b.bc}}><div className="arch-icon">{b.icon}</div><div className="arch-title">{b.title}</div><div className="arch-sub">{b.sub}</div></div>{i<boxes.length-1&&<div className="arch-arrow">\u2192</div>}</React.Fragment>)}</div><div style={{textAlign:'center',marginTop:12,fontSize:12,color:'var(--text-dim)'}}>The agent loop continues until Claude determines the question is fully answered</div></div>
  <div className="card"><h3>Available Tools</h3><div className="sub">Claude automatically discovers and orchestrates these tools</div><div className="tools-grid">{TOOLS_LIST.map((t,i)=><div className="tool-card" key={i}><div className="tc-name">\u26a1 {t.name}</div><div className="tc-desc">{t.desc}</div></div>)}</div></div></div>);
}

function DatasetTab(){
  const kpis=[{l:'Rows',v:'1,200',c:'#a855f7'},{l:'Columns',v:'14',c:'#14b8a6'},{l:'Total Revenue',v:'\u00a37.8M',c:'#6366f1'},{l:'Avg Satisfaction',v:'7.6/10',c:'#f97316'}];
  return(<div>
    <div className="kpi-row">{kpis.map((k,i)=><div className="kpi" key={i}><div className="kpi-label">{k.l}</div><div className="kpi-val" style={{color:k.c}}>{k.v}</div></div>)}</div>
    <div className="grid2">
      <div className="card"><h3>Revenue by Region</h3><div className="sub">Sales distribution across UK regions</div><ChartBox type="bar" data={{labels:['North','South','East','West'],datasets:[{label:'Revenue \u00a3M',data:[2.4,2.1,1.8,1.5],backgroundColor:['#a855f7','#6366f1','#14b8a6','#f97316'],borderRadius:6,barThickness:36}]}} options={{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#5e5e78'}},y:{grid:{color:'rgba(42,42,58,0.5)'},ticks:{color:'#5e5e78'},beginAtZero:true}}}}/></div>
      <div className="card"><h3>Product Category Mix</h3><div className="sub">Revenue share by product line</div><ChartBox type="doughnut" data={{labels:['Electronics','Software','Services','Hardware','Accessories'],datasets:[{data:[32,24,20,14,10],backgroundColor:['#a855f7','#6366f1','#14b8a6','#f97316','#ec4899'],borderWidth:0,borderRadius:4}]}} options={{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'right',labels:{color:'#9595ad',font:{size:11},padding:12}}}}}/></div>
      <div className="card"><h3>Monthly Revenue Trend</h3><div className="sub">12-month revenue with channel breakdown</div><ChartBox type="line" data={{labels:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],datasets:[{label:'Online',data:[280,310,295,340,365,390,380,410,395,420,445,480],borderColor:'#a855f7',backgroundColor:'rgba(168,85,247,0.05)',fill:true,tension:0.4,borderWidth:2,pointRadius:3,pointBackgroundColor:'#a855f7'},{label:'In-Store',data:[320,305,330,315,340,335,350,345,360,355,370,380],borderColor:'#14b8a6',fill:false,tension:0.4,borderWidth:2,borderDash:[5,5],pointRadius:3,pointBackgroundColor:'#14b8a6'}]}} options={{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#9595ad'}}},scales:{x:{grid:{display:false},ticks:{color:'#5e5e78'}},y:{grid:{color:'rgba(42,42,58,0.5)'},ticks:{color:'#5e5e78'}}}}}/></div>
      <div className="card"><h3>Satisfaction by Channel</h3><div className="sub">Average customer satisfaction scores</div><ChartBox type="radar" data={{labels:['Speed','Quality','Support','Value','Experience'],datasets:[{label:'Online',data:[8.2,7.8,6.9,7.5,7.0],borderColor:'#a855f7',backgroundColor:'rgba(168,85,247,0.1)',borderWidth:2,pointBackgroundColor:'#a855f7'},{label:'In-Store',data:[6.5,8.1,8.4,7.2,8.5],borderColor:'#14b8a6',backgroundColor:'rgba(20,184,166,0.1)',borderWidth:2,pointBackgroundColor:'#14b8a6'}]}} options={{responsive:true,maintainAspectRatio:false,scales:{r:{angleLines:{color:'rgba(42,42,58,0.5)'},grid:{color:'rgba(42,42,58,0.5)'},pointLabels:{color:'#9595ad',font:{size:12}},ticks:{display:false},suggestedMin:4,suggestedMax:10}},plugins:{legend:{labels:{color:'#9595ad'}}}}}/></div>
    </div>
  </div>);
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
